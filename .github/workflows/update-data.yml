name: Regionaldaten aktualisieren (Eurostat)

on:
  schedule:
    # Erster Tag jedes Monats, 06:00 UTC
    - cron: '0 6 1 * *'
  workflow_dispatch:
    # Manueller Trigger über GitHub UI (Actions → Run workflow)

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Eurostat-Daten holen und regional-generated.js erzeugen
        run: node scripts/update-data.mjs

      - name: Tests laufen lassen (Regression)
        run: npm test

      - name: Änderungen committen (falls vorhanden)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/regional.json data/regional-generated.js
          # Nur committen wenn sich wirklich etwas geändert hat
          git diff --cached --quiet || git commit -m "Regionaldaten: Eurostat-Update $(date +%Y-%m)"
